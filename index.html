<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>改行位置の印象評価実験</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startPage" class="page">
  <h1>改行位置の印象評価実験</h1>
  <p>
    この実験では、文章の改行位置に対する印象を調査します。
    表示される文章を読んだ後、印象評価と理解度テストに回答してください。
  </p>
  <p>
    回答は研究目的以外では使用しません。所要時間は5分程度です。
  </p>
   <button onclick="showPage('attributePage')">開始する</button>
</div>

<div id="attributePage" class="page hidden">


  <h2>属性入力</h2>

  <label>年齢</label>
  <input type="number" id="age" placeholder="例：21">

  <label>性別</label>
  <select id="gender">
    <option value="">選択してください</option>
    <option value="男">男</option>
    <option value="女">女</option>
    <option value="その他">その他</option>
    <option value="無回答">無回答</option>
  </select>

  <label>実験を受けている場所</label>
  <select id="place">
    <option value="">選択してください</option>
    <option value="大学">大学</option>
    <option value="自宅">自宅</option>
    <option value="その他">その他</option>
    <option value="無回答">無回答</option>
  </select>

  <label>読書頻度</label>
  <select id="readingHabit">
    <option value="">選択してください</option>
    <option value="ほとんど読まない">ほとんど読まない</option>
    <option value="月に1〜2冊">月に1〜2冊</option>
    <option value="週に1冊程度">週に1冊程度</option>
    <option value="週に2冊以上">週に2冊以上</option>
  </select>

  <label>1日のスマホ利用時間</label>
  <select id="smartphoneTime">
    <option value="">選択してください</option>
    <option value="1時間未満">1時間未満</option>
    <option value="1〜3時間">1〜3時間</option>
    <option value="3〜5時間">3〜5時間</option>
    <option value="5時間以上">5時間以上</option>
  </select>

  <button onclick="startExperiment()">実験を始める</button>
</div>

<div id="textPage" class="page hidden">
  <h2 id="textTitle"></h2>
  <img id="textImage" src="" alt="実験文章">
  <button onclick="goSurvey()">読み終わった</button>
</div>


<div id="surveyPage" class="page hidden">
  <h2>印象評価</h2>
  <p>文章の内容ではなく、改行のされ方について評価してください。</p>
  <div id="surveyArea"></div>
  <button onclick="goQuiz()">次へ</button>
</div>

<div id="quizPage" class="page hidden">
  <h2>理解度テスト</h2>
  <div id="quizArea"></div>
  <button onclick="saveResult()">次へ</button>
</div>

<div id="endPage" class="page hidden">
  <h2>ご協力ありがとうございました</h2>
  <p>送信ボタンを押して回答を送信してください。</p>
  <button onclick="submitData()">送信する</button>
  <p id="sendStatus"></p>
</div>

<script src="script.js"></script>
</body>
</html>
